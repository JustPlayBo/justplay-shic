<h1 mat-dialog-title>{{ 'adventures.title' | translate }}</h1>
<div mat-dialog-content *ngIf="adventures">
  <mat-list *ngIf="adventures.length > 0">
      <mat-list-item *ngFor="let i of adventures"><button mat-button (click)="startAdventure(i)">{{i.name}} {{ 'adventures.by' | translate }} {{i.author}}</button></mat-list-item>
  </mat-list>

  <div *ngIf="adventures.length === 0">
      {{ 'adventures.empty' | translate }}
  </div>
</div>
<div mat-dialog-actions>
</div>
