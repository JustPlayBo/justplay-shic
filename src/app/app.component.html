<mat-toolbar color="primary">
  <mat-toolbar-row>
    <button mat-button (click)="lbar.toggle()" [attr.aria-label]="'app.open_times' | translate">
      <mat-icon class="example-icon" aria-hidden="true">menu</mat-icon>
      <span>Times</span>
    </button>
    <span class="example-spacer"></span>
    <span class="title">{{ 'app.title' | translate }}</span>
    <button mat-icon-button (click)="gameInfo()" [attr.aria-label]="'app.info_aria' | translate">
      <mat-icon>info</mat-icon>
    </button>
    <button mat-icon-button (click)="openSearch()" [attr.aria-label]="'app.search_aria' | translate">
      <mat-icon>search</mat-icon>
    </button>

    <button mat-button [matMenuTriggerFor]="appMenu">{{ 'app.adventures_menu' | translate }}</button>

    <button mat-icon-button [matMenuTriggerFor]="langMenu" [attr.aria-label]="'lang.label' | translate">
      <mat-icon>translate</mat-icon>
    </button>
    <mat-menu #langMenu="matMenu">
      <button mat-menu-item *ngFor="let l of supportedLangs" (click)="setLang(l)">
        <mat-icon>{{ lang.current() === l ? 'check' : '' }}</mat-icon>
        <span>{{ ('lang.' + (l === 'it' ? 'italian' : 'english')) | translate }}</span>
      </button>
    </mat-menu>

    <span class="example-spacer"></span>
    <button mat-button (click)="rbar.toggle()" [attr.aria-label]="'app.open_annuario' | translate">
      <span>Annuario</span>
      <mat-icon class="example-icon" aria-hidden="true">menu</mat-icon>
    </button>
  </mat-toolbar-row>
</mat-toolbar>

<mat-drawer-container class="example-container">
  <mat-drawer class="sidebar-wide" #lbar mode="over" opened>
    <mat-accordion>
      <mat-expansion-panel *ngFor="let timed of times" [expanded]="timed.open">
        <mat-expansion-panel-header>
          {{timed.title}}
        </mat-expansion-panel-header>
        <ng-template matExpansionPanelContent>
          <img *ngFor="let url of timed.pages; let i = index"
               [src]="url" width="215"
               [alt]="'app.page_alt' | translate:{ n: i + 1, title: timed.title }"
               loading="lazy" decoding="async"
               (click)="show('The Times', url, 900)">
        </ng-template>
      </mat-expansion-panel>
    </mat-accordion>
  </mat-drawer>

  <mat-drawer class="sidebar" #rbar position="end" mode="over" opened>
    <mat-accordion>
      <mat-expansion-panel *ngFor="let annu of annuario" [expanded]="annu.open">
        <mat-expansion-panel-header>
          {{annu.title}}
        </mat-expansion-panel-header>
        <ng-template matExpansionPanelContent>
          <img *ngFor="let url of annu.pages; let i = index"
               [src]="url" width="240"
               [alt]="'app.page_alt' | translate:{ n: i + 1, title: annu.title }"
               loading="lazy" decoding="async"
               (click)="show('Annuario', url, 800)">
        </ng-template>
      </mat-expansion-panel>
    </mat-accordion>
  </mat-drawer>
  <mat-drawer-content>
    <div id="map"></div>
  </mat-drawer-content>
</mat-drawer-container>

<mat-menu #appMenu="matMenu">
  <button mat-menu-item (click)="chooseAdventure()">{{ 'app.menu.choose' | translate }}</button>
  <button mat-menu-item (click)="adventureFileInput.click()">
    <mat-icon>folder_open</mat-icon>
    <span>{{ 'app.menu.load_json' | translate }}</span>
  </button>
  <button *ngIf="adv.adventureSelected" mat-menu-item (click)="showIntro()">{{ 'app.menu.reread_intro' | translate }}</button>
  <button *ngIf="adv.adventureSelected" mat-menu-item (click)="solveAdventure()">{{ 'app.menu.solve' | translate }}</button>
  <button *ngIf="adv.adventureSelected && hasQuestions" mat-menu-item (click)="openQuestions()">
    <mat-icon>quiz</mat-icon>
    <span>{{ 'app.menu.questions' | translate }}</span>
  </button>
  <button *ngIf="adv.adventureSelected && hasSherlockPath" mat-menu-item (click)="openSherlockPath()">
    <mat-icon>route</mat-icon>
    <span>{{ 'app.menu.path' | translate }}</span>
  </button>
  <button *ngIf="adv.adventureSelected" mat-menu-item (click)="unloadAdventure()">
    <mat-icon>close</mat-icon>
    <span>{{ 'app.menu.unload' | translate }}</span>
  </button>
  <button mat-menu-item (click)="openCreateAdventure()">
    <mat-icon>create</mat-icon>
    <span>{{ 'app.menu.create' | translate }}</span>
  </button>
  <mat-divider></mat-divider>
  <button mat-menu-item (click)="newSession()">
    <mat-icon>play_arrow</mat-icon>
    <span>{{ (session.isActive() ? 'app.menu.restart_session' : 'app.menu.new_session') | translate }}</span>
  </button>
  <button mat-menu-item (click)="openTaccuino()">
    <mat-icon>menu_book</mat-icon>
    <span>{{ 'app.menu.taccuino' | translate }}</span>
  </button>
  <button mat-menu-item (click)="endSession()" *ngIf="session.isActive()">
    <mat-icon>stop</mat-icon>
    <span>{{ 'app.menu.end_session' | translate }}</span>
  </button>
</mat-menu>

<input #adventureFileInput type="file" accept="application/json"
       (change)="loadAdventureFromFile($event)" hidden>
