<mat-toolbar color="primary">
  <mat-toolbar-row>
    <button mat-button (click)="lbar.toggle()" aria-label="Apri pannello Times">
      <mat-icon class="example-icon" aria-hidden="true">menu</mat-icon>
      <span>Times</span>
    </button>
    <span class="example-spacer"></span>
    <span class="title">Sherlock Holmes - Consulente Investigativo</span>
    <button mat-icon-button (click)="gameInfo()" aria-label="Informazioni sul gioco">
      <mat-icon>info</mat-icon>
    </button>
    <button mat-icon-button (click)="openSearch()" aria-label="Cerca un luogo">
      <mat-icon>search</mat-icon>
    </button>

    <button mat-button [matMenuTriggerFor]="appMenu">Avventure</button>
    <span class="example-spacer"></span>
    <button mat-button (click)="rbar.toggle()" aria-label="Apri pannello Annuario">
      <span>Annuario</span>
      <mat-icon class="example-icon" aria-hidden="true">menu</mat-icon>
    </button>
  </mat-toolbar-row>
</mat-toolbar>

<mat-drawer-container class="example-container">
  <mat-drawer class="sidebar-wide" #lbar mode="over" opened>
    <mat-accordion>
      <mat-expansion-panel *ngFor="let timed of times" [expanded]="timed.open">
        <mat-expansion-panel-header>
          {{timed.title}}
        </mat-expansion-panel-header>
        <ng-template matExpansionPanelContent>
          <img *ngFor="let url of timed.pages; let i = index"
               [src]="url" width="215"
               [alt]="'Pagina ' + (i + 1) + ' — ' + timed.title"
               loading="lazy" decoding="async"
               (click)="show('The Times', url, 900)">
        </ng-template>
      </mat-expansion-panel>
    </mat-accordion>
  </mat-drawer>

  <mat-drawer class="sidebar" #rbar position="end" mode="over" opened>
    <mat-accordion>
      <mat-expansion-panel *ngFor="let annu of annuario" [expanded]="annu.open">
        <mat-expansion-panel-header>
          {{annu.title}}
        </mat-expansion-panel-header>
        <ng-template matExpansionPanelContent>
          <img *ngFor="let url of annu.pages; let i = index"
               [src]="url" width="240"
               [alt]="'Pagina ' + (i + 1) + ' — ' + annu.title"
               loading="lazy" decoding="async"
               (click)="show('Annuario', url, 800)">
        </ng-template>
      </mat-expansion-panel>
    </mat-accordion>
  </mat-drawer>
  <mat-drawer-content>
    <div id="map"></div>
  </mat-drawer-content>
</mat-drawer-container>

<mat-menu #appMenu="matMenu">
  <button mat-menu-item (click)="chooseAdventure()">Scegli Avventura</button>
  <button *ngIf="adv.adventureSelected" mat-menu-item (click)="solveAdventure()">Rileggi introduzione</button>
  <button *ngIf="adv.adventureSelected" mat-menu-item (click)="solveAdventure()">Risolvi il caso</button>
  <a href="https://adventures.sherlock.justplaybo.it" target="_blank" rel="noopener" mat-menu-item>Crea Avventura...</a>
  <mat-divider></mat-divider>
  <button mat-menu-item (click)="newSession()">
    <mat-icon>play_arrow</mat-icon>
    <span>{{ session.isActive() ? 'Ricomincia partita' : 'Nuova partita' }}</span>
  </button>
  <button mat-menu-item (click)="openTaccuino()">
    <mat-icon>menu_book</mat-icon>
    <span>Taccuino</span>
  </button>
  <button mat-menu-item (click)="endSession()" *ngIf="session.isActive()">
    <mat-icon>stop</mat-icon>
    <span>Termina partita</span>
  </button>
</mat-menu>
